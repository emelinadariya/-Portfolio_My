<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё портфолио</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Слайдер -->
    <section class="slider">
        <div class="slides">
            <div class="slide active"><img src="images/art.jpg" alt="Слайд 1"></div>
            <div class="slide"><img src="images/ul.JPG" alt="Слайд 2"></div>
            <div class="slide"><img src="images/zim.JPG" alt="Слайд 3"></div>
        </div>
        <button class="prev" onclick="changeSlide(-1)">‹</button>
        <button class="next" onclick="changeSlide(1)">›</button>
    </section>

    <!-- Обо мне -->
    <section class="about">
        <h2>Обо мне</h2>
        <div class="about-content">
            <div class="about-text">
                <p>Привет! Я фотограф, специализируюсь на художественных портретах! Чаще всего я снимаю на пленку, потому что так получается лучший цвет</p>
            </div>
            <div class="about-skills">
                <h3>Навыки</h3>
                <ul>
                    <li>Visual Studio Code</li>
                    <li>Git Hub</li>
                    <li>YouGile</li>
                    <li>Иллюстрации</li>
                    <li>Photoshop</li>
                </ul>
            </div>
        </div>
    </section>

    <!-- Галерея работ -->
    <section class="gallery">
        <h2>Мои работы</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="images/ir.JPG" alt="Работа 1"></div>
            <div class="gallery-item"><img src="images/kov.JPG" alt="Работа 2"></div>
            <div class="gallery-item"><img src="images/shah.jpg" alt="Работа 3"></div>
            <div class="gallery-item"><img src="images/zag.JPG" alt="Работа 4"></div>
            <div class="gallery-item"><img src="images/nas.jpg" alt="Работа 5"></div>
            <div class="gallery-item"><img src="images/sash.jpg" alt="Работа 6"></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
